apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: message-queue
  labels:
    app: product-service
spec:
  # 3 replicas for HA.
  # Seeding uses INSERT ... ON CONFLICT DO NOTHING — safe to run on all pods simultaneously.
  # No cron job — no leader election needed.
  replicas: 3

  selector:
    matchLabels:
      app: product-service

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: product-service
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: product-service

      containers:
        - name: product-service
          # Build: docker build -t product-service:latest ./product-service
          image: product-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3003
              name: http

          envFrom:
            - configMapRef:
                name: product-service-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'

          readinessProbe:
            httpGet:
              path: /products
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /products
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /products
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
