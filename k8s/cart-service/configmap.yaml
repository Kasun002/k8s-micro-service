apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-service-config
  namespace: message-queue
data:
  # ── Database ────────────────────────────────────────────────────
  DB_HOST: 'host.docker.internal'
  DB_PORT: '5432'
  DB_NAME: 'cart_db'

  # ── SQS / LocalStack ────────────────────────────────────────────
  SQS_REGION: 'us-east-1'
  SQS_ENDPOINT: 'http://host.docker.internal:4566'
  SQS_QUEUE_URL: 'http://host.docker.internal:4566/000000000000/order-created'

  # ── App ─────────────────────────────────────────────────────────
  PORT: '3001'
  NODE_ENV: 'production'
