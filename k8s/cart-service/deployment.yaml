apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: message-queue
  labels:
    app: cart-service
spec:
  # 3 replicas for HA.
  # All pods serve HTTP requests — load balanced by the Service.
  # No cron job — no leader election needed.
  replicas: 3

  selector:
    matchLabels:
      app: cart-service

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: cart-service
    spec:
      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cart-service

      containers:
        - name: cart-service
          # Build: docker build -t cart-service:latest ./cart-service
          image: cart-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3001
              name: http

          envFrom:
            - configMapRef:
                name: cart-service-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cart-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cart-service-secret
                  key: DB_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cart-service-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cart-service-secret
                  key: AWS_SECRET_ACCESS_KEY

          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'

          readinessProbe:
            httpGet:
              path: /cart/user1
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /cart/user1
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /cart/user1
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
