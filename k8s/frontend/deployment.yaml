apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: message-queue
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Spread pods across nodes when more than one is available
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: frontend

      containers:
        - name: frontend
          image: frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3004

          envFrom:
            - configMapRef:
                name: frontend-config

          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'

          readinessProbe:
            httpGet:
              path: /
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /
              port: 3004
            failureThreshold: 12
            periodSeconds: 5
