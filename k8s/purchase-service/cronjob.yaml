apiVersion: batch/v1
kind: CronJob
metadata:
  name: purchase-daily-report
  namespace: message-queue
  labels:
    app: purchase-daily-report
spec:
  # ── Schedule ──────────────────────────────────────────────────────────────
  # Runs at 00:00 UTC every day.
  schedule: '0 0 * * *'

  # ── Concurrency ───────────────────────────────────────────────────────────
  # Forbid prevents a new Job from starting if the previous one is still running.
  # This replaces the PostgreSQL advisory lock approach — K8s is now the arbiter.
  concurrencyPolicy: Forbid

  # ── History ───────────────────────────────────────────────────────────────
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Retry up to 2 times on failure before marking the Job as failed.
      backoffLimit: 2

      template:
        metadata:
          labels:
            app: purchase-daily-report
        spec:
          # Pod exits after the script finishes — never restart on success.
          restartPolicy: OnFailure

          containers:
            - name: daily-report
              # Same image as the Deployment — built locally for Docker Desktop.
              image: purchase-service:latest
              imagePullPolicy: Never

              # Override the default entrypoint to run only the cron script.
              # nest build compiles src/cron/daily-report.ts → dist/cron/daily-report.js
              command: ['node', 'dist/cron/daily-report.js']

              # ── Environment: non-secret ──────────────────────────────────
              envFrom:
                - configMapRef:
                    name: purchase-service-config

              # ── Environment: secrets ─────────────────────────────────────
              env:
                - name: DB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: purchase-service-secret
                      key: DB_USERNAME
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: purchase-service-secret
                      key: DB_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: purchase-service-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: purchase-service-secret
                      key: AWS_SECRET_ACCESS_KEY

              # ── Resource limits ──────────────────────────────────────────
              # Cron pod is short-lived — lower limits than the long-running service.
              resources:
                requests:
                  cpu: '100m'
                  memory: '128Mi'
                limits:
                  cpu: '300m'
                  memory: '256Mi'
