apiVersion: v1
kind: Service
metadata:
  name: purchase-service
  namespace: message-queue
  labels:
    app: purchase-service
spec:
  selector:
    app: purchase-service

  # NodePort exposes the service on localhost:30002 on Docker Desktop.
  # Traffic is load-balanced across all 3 pods automatically.
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 3002 # ClusterIP port (internal)
      targetPort: 3002 # container port
      nodePort: 30002 # external port on Docker Desktop host
